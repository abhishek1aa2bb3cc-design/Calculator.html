<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scientific Calculator</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
  font-family: Arial;
}

.calculator {
  background: #1e1e2f;
  padding: 20px;
  border-radius: 20px;
  width: 360px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

#display {
  width: 100%;
  height: 60px;
  font-size: 22px;
  border: none;
  border-radius: 10px;
  margin-bottom: 15px;
  padding: 10px;
  text-align: right;
  background: #2c2c3c;
  color: white;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}

button {
  height: 55px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.number { background: #3a3a5a; color: white; }
.operator { background: #ff9500; color: white; }
.func { background: #444; color: cyan; }
.equal { background: #00c853; color: white; grid-column: span 2; }
.clear { background: #ff3b30; color: white; }
</style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" placeholder="0">

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="func" onclick="func('sqrt')">√</button>
    <button class="func" onclick="func('log')">log</button>
    <button class="operator" onclick="append('/')">÷</button>
    <button class="operator" onclick="append('*')">×</button>

    <button class="func" onclick="func('sin')">sin</button>
    <button class="func" onclick="func('cos')">cos</button>
    <button class="func" onclick="func('tan')">tan</button>
    <button class="operator" onclick="append('-')">−</button>
    <button class="operator" onclick="append('+')">+</button>

    <button class="number" onclick="append('7')">7</button>
    <button class="number" onclick="append('8')">8</button>
    <button class="number" onclick="append('9')">9</button>
    <button class="func" onclick="append('**2')">x²</button>
    <button class="equal" onclick="calculate()">=</button>

    <button class="number" onclick="append('4')">4</button>
    <button class="number" onclick="append('5')">5</button>
    <button class="number" onclick="append('6')">6</button>
    <button class="func" onclick="append('**')">xʸ</button>

    <button class="number" onclick="append('1')">1</button>
    <button class="number" onclick="append('2')">2</button>
    <button class="number" onclick="append('3')">3</button>

    <button class="number" onclick="append('0')">0</button>
    <button class="number" onclick="append('.')">.</button>
  </div>
</div>

<script>
const display = document.getElementById("display");

function append(val) {
  display.value += val;
}

function clearDisplay() {
  display.value = "";
}

function calculate() {
  try {
    display.value = eval(display.value);
  } catch {
    display.value = "Error";
  }
}

// Scientific functions
function func(type) {
  try {
    let val = eval(display.value);
    let result;

    switch(type) {
      case 'sin': result = Math.sin(toRad(val)); break;
      case 'cos': result = Math.cos(toRad(val)); break;
      case 'tan': result = Math.tan(toRad(val)); break;
      case 'sqrt': result = Math.sqrt(val); break;
      case 'log': result = Math.log10(val); break;
    }

    display.value = result;
  } catch {
    display.value = "Error";
  }
}

function toRad(deg) {
  return deg * Math.PI / 180;
}

// Keyboard Support
document.addEventListener("keydown", function(e) {
  if (!isNaN(e.key) || "+-*/.%".includes(e.key)) {
    display.value += e.key;
  } else if (e.key === "Enter") {
    calculate();
  } else if (e.key === "Backspace") {
    display.value = display.value.slice(0, -1);
  } else if (e.key === "Escape") {
    clearDisplay();
  }
});
</script>

</body>
</html>
