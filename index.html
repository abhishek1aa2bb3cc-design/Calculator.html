<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Scientific Calculator</title>

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: Arial;
  background: #1e1e1e;
  color: white;
}

.container {
  display: flex;
  margin: auto;
  gap: 20px;
}

.calculator {
  background: #2c2c2c;
  padding: 20px;
  border-radius: 15px;
}

#display, #graphInput {
  width: 100%;
  height: 50px;
  font-size: 18px;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5, 60px);
  gap: 10px;
}

button {
  height: 45px;
  font-size: 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.equal { background: orange; color: white; }
.clear { background: red; color: white; }
.func { background: #444; color: cyan; }

.history {
  width: 220px;
  background: #111;
  padding: 10px;
  border-radius: 10px;
  overflow-y: auto;
}

.light {
  background: #f5f5f5;
  color: black;
}

.light .calculator { background: #ddd; }
.light .history { background: #eee; }

canvas {
  margin-top: 10px;
  background: white;
}
</style>
</head>

<body>

<div class="container">

<div class="calculator">
  <input type="text" id="display" placeholder="Enter calculation">

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="appendValue('(')">(</button>
    <button onclick="appendValue(')')">)</button>
    <button onclick="appendValue('/')">/</button>
    <button onclick="appendValue('*')">*</button>

    <button class="func" onclick="func('sin')">sin</button>
    <button class="func" onclick="func('cos')">cos</button>
    <button class="func" onclick="func('tan')">tan</button>
    <button onclick="appendValue('-')">-</button>
    <button onclick="appendValue('+')">+</button>

    <button class="func" onclick="func('sqrt')">√</button>
    <button class="func" onclick="func('log')">log</button>
    <button onclick="appendValue('**')">x²</button>
    <button onclick="appendValue('7')">7</button>
    <button onclick="appendValue('8')">8</button>

    <button onclick="appendValue('9')">9</button>
    <button onclick="appendValue('4')">4</button>
    <button onclick="appendValue('5')">5</button>
    <button onclick="appendValue('6')">6</button>
    <button class="equal" onclick="calculate()">=</button>

    <button onclick="appendValue('1')">1</button>
    <button onclick="appendValue('2')">2</button>
    <button onclick="appendValue('3')">3</button>
    <button onclick="appendValue('0')">0</button>
    <button onclick="appendValue('.')">.</button>
  </div>

  <button onclick="toggleTheme()">🌗 Theme</button>

  <h4>Graph (use x)</h4>
  <input id="graphInput" placeholder="e.g. Math.sin(x), x*x">
  <button onclick="plotGraph()">📈 Plot Graph</button>

  <canvas id="graph" width="300" height="200"></canvas>
</div>

<div class="history">
  <h3>History</h3>
  <button onclick="clearHistory()">Clear</button>
  <ul id="historyList"></ul>
</div>

</div>

<script>
const display = document.getElementById("display");
const historyList = document.getElementById("historyList");

// Load history
window.onload = () => {
  let data = JSON.parse(localStorage.getItem("history")) || [];
  data.forEach(addToHistoryUI);
};

function appendValue(val) {
  display.value += val;
}

function clearDisplay() {
  display.value = "";
}

function calculate() {
  try {
    let result = eval(display.value);
    let entry = display.value + " = " + result;
    addToHistory(entry);
    display.value = result;
  } catch {
    alert("Error");
  }
}

function func(type) {
  try {
    let val = eval(display.value);
    let result;

    switch(type) {
      case 'sin': result = Math.sin(toRad(val)); break;
      case 'cos': result = Math.cos(toRad(val)); break;
      case 'tan': result = Math.tan(toRad(val)); break;
      case 'sqrt': result = Math.sqrt(val); break;
      case 'log': result = Math.log10(val); break;
    }

    let entry = type + "(" + val + ") = " + result;
    addToHistory(entry);
    display.value = result;

  } catch {
    alert("Error");
  }
}

function toRad(deg) {
  return deg * Math.PI / 180;
}

// History
function addToHistory(text) {
  let data = JSON.parse(localStorage.getItem("history")) || [];
  data.push(text);
  localStorage.setItem("history", JSON.stringify(data));
  addToHistoryUI(text);
}

function addToHistoryUI(text) {
  let li = document.createElement("li");
  li.textContent = text;
  historyList.appendChild(li);
}

function clearHistory() {
  localStorage.removeItem("history");
  historyList.innerHTML = "";
}

// Theme
function toggleTheme() {
  document.body.classList.toggle("light");
}

// Keyboard
document.addEventListener("keydown", (e) => {
  if (!isNaN(e.key) || "+-*/().".includes(e.key)) {
    display.value += e.key;
  } else if (e.key === "Enter") {
    calculate();
  } else if (e.key === "Backspace") {
    display.value = display.value.slice(0, -1);
  }
});

// Graph Plotting
function plotGraph() {
  let input = document.getElementById("graphInput").value;
  let canvas = document.getElementById("graph");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.beginPath();

  for (let x = -10; x <= 10; x += 0.1) {
    let y;
    try {
      y = eval(input);
    } catch {
      alert("Invalid function");
      return;
    }

    let px = (x + 10) * (canvas.width / 20);
    let py = canvas.height / 2 - y * 10;

    ctx.lineTo(px, py);
  }

  ctx.stroke();
}
</script>

</body>
</html>
