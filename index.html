<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Insane Calculator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e1e1e, #000);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.calculator {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
}

input {
  width: 100%;
  height: 50px;
  margin: 10px 0;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  padding: 10px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  padding: 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.equal { background: orange; }
.clear { background: red; }

canvas {
  width: 100%;
  background: white;
  margin-top: 10px;
}

.history {
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
<div class="calculator">

<input id="display" placeholder="Try: sin 30 + 5^2">
<div class="buttons">
<button onclick="clearDisplay()" class="clear">C</button>
<button onclick="calculate()" class="equal">=</button>
<button onclick="startVoice()">🎤</button>
<button onclick="downloadHistory()">⬇</button>
</div>

<h3>Graph</h3>
<input id="graphInput" placeholder="Try: Math.sin(x), x*x">
<button onclick="plotGraph()">Plot</button>
<button onclick="saveGraph()">📸 Save Graph</button>

<canvas id="graph" height="250"></canvas>

<div class="history">
<h3>History</h3>
<ul id="historyList"></ul>
</div>

</div>
</div>

<script>
const display = document.getElementById("display");
const historyList = document.getElementById("historyList");

// SMART PARSER (AI-like)
function parseExpression(exp) {
  exp = exp.replace(/sin/g, "Math.sin")
           .replace(/cos/g, "Math.cos")
           .replace(/tan/g, "Math.tan")
           .replace(/sqrt/g, "Math.sqrt")
           .replace(/log/g, "Math.log10")
           .replace(/\^/g, "**");

  // Convert degrees to radians for trig
  exp = exp.replace(/Math\.(sin|cos|tan)\((.*?)\)/g,
    (_, fn, val) => `Math.${fn}((${val})*Math.PI/180)`
  );

  return exp;
}

function calculate() {
  try {
    let exp = parseExpression(display.value);
    let result = eval(exp);
    addHistory(display.value + " = " + result);
    display.value = result;
  } catch {
    alert("Invalid input");
  }
}

function clearDisplay() {
  display.value = "";
}

// HISTORY
function addHistory(text) {
  let li = document.createElement("li");
  li.textContent = text;
  historyList.appendChild(li);
}

// DOWNLOAD HISTORY
function downloadHistory() {
  let text = historyList.innerText;
  let blob = new Blob([text], {type: "text/plain"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "history.txt";
  a.click();
}

// VOICE INPUT 🎤
function startVoice() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.onresult = function(e) {
    display.value = e.results[0][0].transcript;
  };
  recognition.start();
}

// GRAPH
function plotGraph() {
  let input = document.getElementById("graphInput").value;
  let canvas = document.getElementById("graph");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();

  for (let x = -10; x <= 10; x += 0.1) {
    let y;
    try {
      y = eval(input);
    } catch {
      alert("Invalid graph");
      return;
    }

    let px = (x + 10) * (canvas.width / 20);
    let py = canvas.height/2 - y * 10;

    ctx.lineTo(px, py);
  }

  ctx.stroke();
}

// SAVE GRAPH
function saveGraph() {
  let canvas = document.getElementById("graph");
  let link = document.createElement("a");
  link.download = "graph.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
