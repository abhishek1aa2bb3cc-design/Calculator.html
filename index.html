<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Calculator</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .calculator {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      height: 60px;
      font-size: 24px;
      margin-bottom: 10px;
      text-align: right;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 10px;
    }

    button {
      height: 50px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    button:hover {
      background: #475569;
    }

    .equal {
      background: #22c55e;
    }

    .clear {
      background: #ef4444;
    }
  </style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button onclick="clearDisplay()" class="clear">C</button>
    <button onclick="deleteLast()">DEL</button>
    <button onclick="append('%')">%</button>
    <button onclick="append('/')">/</button>
    <button onclick="append('Math.sqrt(')">√</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('*')">*</button>
    <button onclick="append('Math.pow(')">xʸ</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('-')">-</button>
    <button onclick="append('Math.sin(')">sin</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('+')">+</button>
    <button onclick="append('Math.cos(')">cos</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="calculate()" class="equal">=</button>
    <button onclick="append('Math.tan(')">tan</button>
    <button onclick="append('Math.log(')">log</button>
  </div>
</div>

<script>
  let display = document.getElementById("display");

  function append(value) {
    display.value += value;
  }

  function clearDisplay() {
    display.value = "";
  }

  function deleteLast() {
    display.value = display.value.slice(0, -1);
  }

  function calculate() {
    try {
      display.value = eval(display.value);
    } catch {
      display.value = "Error";
    }
  }
</script>

</body>
</html>
